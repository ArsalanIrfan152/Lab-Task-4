<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f0f2f5;
        }

        .fb-title {
            color: #1877f2;
            font-size: 60px;
            font-weight: bold;
        }

        .login-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }

        .btn-login {
            background-color: #1877f2;
            color: white;
            font-weight: bold;
        }

            .btn-login:hover {
                background-color: #166fe5;
            }

        .btn-create {
            background-color: #42b72a;
            color: white;
            font-weight: bold;
        }

            .btn-create:hover {
                background-color: #36a420;
            }
    </style>
</head>

<body>

    <div class="container vh-100 d-flex align-items-center">
        <div class="row w-100">

            <!-- Left Section -->
            <div class="col-md-6 d-flex flex-column justify-content-center">
                <h1 class="fb-title">facebook</h1>
                <p class="fs-4">
                    Facebook helps you connect and share with the people in your life.
                </p>
            </div>

            <!-- Right Section -->
            <div class="col-md-6">
                <div class="card login-card p-4">
                    <form>
                        <div class="mb-3">
                            <input type="email" class="form-control form-control-lg" placeholder="Email address">
                        </div>

                        <div class="mb-3">
                            <input type="password" class="form-control form-control-lg" placeholder="Password">
                        </div>

                        <button class="btn btn-login w-100 btn-lg mb-3">Log In</button>

                        <div class="text-center mb-3">
                            <a href="#" class="text-decoration-none">Forgotten password?</a>
                        </div>

                        <hr>

                        <div class="text-center">
                            <button class="btn btn-create btn-lg px-4">Create New Account</button>
                        </div>
                    </form>
                </div>

                <p class="text-center mt-4">
                    <strong>Create a Page</strong> for a celebrity, brand or business.
                </p>
            </div>

        </div>
    </div>

</body>
</html>
